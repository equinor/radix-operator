{{- if .Values.radixApiServer.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: radix-api-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "radix-api-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "radix-api-server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.radixApiServer.networkPolicy.ingress }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .namespaceMatchLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .podMatchLabels | nindent 14 }}
        {{- end }}
{{- end }}
